<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yojana Sahayak - Full Screen Presentation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0b071e;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(15, 12, 41, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff9933 0%, #ffffff 50%, #138808 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #8b5cf6;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border: none;
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .voice-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #a78bfa;
        }

        .pulse-ring {
            width: 8px;
            height: 8px;
            background: #8b5cf6;
            border-radius: 50%;
            display: none;
        }

        .pulse-ring.active {
            display: block;
            box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(139, 92, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }

        /* Slide Viewport */
        .viewport {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background: #060410;
        }

        .slide-frame {
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            object-fit: contain;
            display: none;
        }

        .slide-frame.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Bottom Navigation Bar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(15, 12, 41, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .dots {
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dot.active {
            background: #8b5cf6;
            transform: scale(1.2);
            box-shadow: 0 0 8px #8b5cf6;
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">🇮🇳 Yojana Sahayak GovTech AI Presentation</div>
        <div class="controls">
            <div class="voice-indicator">
                <span class="pulse-ring" id="pulseRing"></span>
                <span id="voiceStatus">Narration Paused</span>
            </div>
            <button class="btn btn-primary" id="playBtn">Play Presentation</button>
            <button class="btn" id="voiceToggle">Toggle Voice</button>
        </div>
    </div>

    <!-- Slide Viewport (Entire chatbot screen will be rendered here as high-res images) -->
    <div class="viewport">
        <img class="slide-frame active" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_1.png" data-slide="0" data-narration="Welcome to the end-to-end presentation of Yojana Sahayak, an AI-powered government schemes assistant. Yojana Sahayak is designed to help Indian citizens easily discover the welfare schemes they qualify for by building a user profile step-by-step and performing real-time semantic searches. In this tour, we will examine the system architecture, the scraped data, the vector database, and the Streamlit frontend. Let's get started.">
        <img class="slide-frame" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_2.png" data-slide="1" data-narration="Let's look at the standard Retrieval-Augmented Generation architecture under the hood. When the user interacts with Streamlit, the chatbot collects 7 key profile fields one-by-one. After each response, a semantic query is built and matched using cosine similarity in ChromaDB. The results are filtered based on the user's State. Finally, the matched documents are passed into Claude Sonnet 4.5 along with the conversation history to generate clear, structured scheme recommendations.">
        <img class="slide-frame" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_3.png" data-slide="2" data-narration="Here is a live demonstration of the chatbot interface screen. The interview begins with Yojana Sahayak warmly welcoming the user and asking which State they live in. Once the user replies that they live in Maharashtra, the application updates their profile checklist in the sidebar and displays that 24 schemes are matching. It then asks the next question regarding their age.">
        <img class="slide-frame" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_4.png" data-slide="3" data-narration="As the conversation continues, the user inputs their age as 32 and occupation as Farmer. The sidebar ticks off these fields instantly and updates the matching schemes counter to 14 active matches. The chatbot then prompts the user for their approximate annual household income.">
        <img class="slide-frame" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_5.png" data-slide="4" data-narration="Next, the user specifies their income as Below 1 Lakh and category as General. Finally, they enter that they need agricultural support and crop insurance. The bot acknowledges all parameters successfully and runs the RAG pipeline query in ChromaDB.">
        <img class="slide-frame" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_6.png" data-slide="5" data-narration="Now, the chatbot screen displays the final recommendations compiled by Claude. It presents the top two matching schemes: PM-KISAN, offering direct income support of six thousand rupees per year, and the crop insurance scheme, PMFBY. Each scheme includes an explanation of why the user qualifies, details on cash or coverage benefits, and official links to apply.">
        <img class="slide-frame" src="file:///C:/Users/hp/.gemini/antigravity/brain/44d597f2-7f79-4fa6-b9d7-cb1a1f6bb403/slide_7.png" data-slide="6" data-narration="Finally, the project is fully packaged and ready for you to run locally. Double-click the START_APP.bat script in the project directory, open http://localhost:8501, and experience Yojana Sahayak live! Thank you for watching the presentation.">
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-bar">
        <button class="btn" id="prevBtn">Previous</button>
        <div class="dots" id="dotsContainer"></div>
        <button class="btn" id="nextBtn">Next</button>
    </div>

    <!-- Javascript logic -->
    <script>
        const frames = document.querySelectorAll('.slide-frame');
        const dotsContainer = document.getElementById('dotsContainer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        const voiceToggleBtn = document.getElementById('voiceToggle');
        const pulseRing = document.getElementById('pulseRing');

        let currentIdx = 0;
        let isPlaying = false;
        let isVoiceEnabled = true;
        let currentUtterance = null;
        const synth = window.speechSynthesis;

        // Render dots
        frames.forEach((frame, idx) => {
            const dot = document.createElement('div');
            dot.className = `dot ${idx === 0 ? 'active' : ''}`;
            dot.addEventListener('click', () => goToSlide(idx));
            dotsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll('.dot');

        function updateUI() {
            frames.forEach((f, idx) => {
                if (idx === currentIdx) {
                    f.classList.add('active');
                    dots[idx].classList.add('active');
                } else {
                    f.classList.remove('active');
                    dots[idx].classList.remove('active');
                }
            });

            if (isPlaying) {
                speakCurrent();
            }
        }

        function goToSlide(idx) {
            currentIdx = idx;
            updateUI();
        }

        prevBtn.addEventListener('click', () => {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIdx < frames.length - 1) {
                currentIdx++;
                updateUI();
            } else {
                stopShow();
            }
        });

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                stopShow();
            } else {
                startShow();
            }
        });

        voiceToggleBtn.addEventListener('click', () => {
            isVoiceEnabled = !isVoiceEnabled;
            if (!isVoiceEnabled) {
                synth.cancel();
                voiceStatus.textContent = "Voice Muted";
                pulseRing.classList.remove('active');
            } else {
                voiceStatus.textContent = isPlaying ? "Speaking..." : "Voice Enabled";
                if (isPlaying) {
                    pulseRing.classList.add('active');
                    speakCurrent();
                }
            }
        });

        function startShow() {
            isPlaying = true;
            playBtn.textContent = "Stop Presentation";
            playBtn.style.background = "#ef4444";
            currentIdx = 0;
            updateUI();
        }

        function stopShow() {
            isPlaying = false;
            playBtn.textContent = "Play Presentation";
            playBtn.style.background = "";
            synth.cancel();
            voiceStatus.textContent = "Narration Paused";
            pulseRing.classList.remove('active');
        }

        function speakCurrent() {
            synth.cancel();
            if (!isVoiceEnabled) return;

            const text = frames[currentIdx].getAttribute('data-narration');
            if (!text) return;

            currentUtterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            
            // Find female voice
            let femaleVoice = voices.find(v => v.lang.startsWith('en') && 
                (v.name.toLowerCase().includes('zira') || 
                 v.name.toLowerCase().includes('female') || 
                 v.name.toLowerCase().includes('hazel') || 
                 v.name.toLowerCase().includes('samantha') || 
                 v.name.toLowerCase().includes('google us english')));
                 
            if (!femaleVoice) {
                femaleVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'));
            }

            if (femaleVoice) {
                currentUtterance.voice = femaleVoice;
            }

            currentUtterance.rate = 1.05;

            currentUtterance.onstart = () => {
                voiceStatus.textContent = "Speaking...";
                pulseRing.classList.add('active');
            };

            currentUtterance.onend = () => {
                pulseRing.classList.remove('active');
                if (isPlaying) {
                    setTimeout(() => {
                        if (isPlaying && currentIdx < frames.length - 1) {
                            currentIdx++;
                            updateUI();
                        } else if (isPlaying) {
                            stopShow();
                        }
                    }, 2000);
                }
            };

            synth.speak(currentUtterance);
        }
    </script>
</body>
</html>
